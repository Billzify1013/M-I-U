<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Aurelia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/[email protected]/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="navbar-mount"></div>

<section class="page-hero">
  <div class="page-hero-img" id="pageHeroImg"></div>
  <div class="page-hero-content">
    <div class="page-hero-mark">— GET IN TOUCH —</div>
    <h1>We'd love<br>to <em>hear</em> from you.</h1>
  </div>
</section>

<section class="section section-warm">
  <div class="contact-grid">
    <!-- Info -->
    <div class="reveal">
      <div class="section-num">01 — Reach Us</div>
      <h2 class="section-title" style="margin-bottom: 50px;">Always <em>here</em>.</h2>
      
      <div class="contact-info-block">
        <div class="contact-info-label">Telephone</div>
        <div class="contact-info-value" id="phone"></div>
      </div>
      
      <div class="contact-info-block">
        <div class="contact-info-label">Electronic Mail</div>
        <div class="contact-info-value" id="email"></div>
      </div>
      
      <div class="contact-info-block">
        <div class="contact-info-label">Address</div>
        <div class="contact-info-value" id="address"></div>
      </div>
      
      <div class="contact-info-block">
        <div class="contact-info-label">Reception Hours</div>
        <div class="contact-info-value">24 hours, every day</div>
      </div>
    </div>
    
    <!-- Form -->
    <div class="form-block reveal">
      <div class="section-num">02 — Reservation</div>
      <h2 class="section-title" style="font-size: 36px; margin-bottom: 30px;">Book your <em>stay</em>.</h2>
      
      <div class="field-row">
        <div class="field-group">
          <label>CHECK-IN</label>
          <input type="date" class="field-input" id="fCheckin">
        </div>
        <div class="field-group">
          <label>CHECK-OUT</label>
          <input type="date" class="field-input" id="fCheckout">
        </div>
      </div>
      
      <div class="field-group">
        <label>NUMBER OF GUESTS</label>
        <select class="field-input" id="fGuests">
          <option value="1">1 Guest</option>
          <option value="2" selected>2 Guests</option>
          <option value="3">3 Guests</option>
          <option value="4">4 Guests</option>
          <option value="5">5 Guests</option>
          <option value="6">6 Guests</option>
        </select>
      </div>
      
      <button class="btn" onclick="handleBooking()" style="margin-top: 12px;">Check Availability <i class="ti ti-arrow-narrow-right"></i></button>
    </div>
  </div>
  
  <div class="container" style="margin-top: 100px;">
    <iframe id="map" class="map-frame" src="" loading="lazy" allowfullscreen></iframe>
  </div>
</section>

<div id="footer-mount"></div>

<script src="assets/data.js"></script>
<script src="assets/shared.js"></script>
<script>
  document.getElementById('navbar-mount').innerHTML = renderNavbar('contact');
  document.getElementById('footer-mount').innerHTML = renderFooter();
  
  document.getElementById('pageHeroImg').style.backgroundImage = `url('${DATA.heroImage}')`;
  document.getElementById('phone').textContent = DATA.phone;
  document.getElementById('email').textContent = DATA.email;
  document.getElementById('address').innerHTML = DATA.address.replace(/\n/g, '<br>');
  document.getElementById('map').src = DATA.mapEmbed;
  
  function handleBooking() {
    const checkin = document.getElementById('fCheckin').value;
    const checkout = document.getElementById('fCheckout').value;
    const guests = document.getElementById('fGuests').value;
    
    if (!checkin || !checkout) {
      alert('Please select check-in and check-out dates.');
      return;
    }
    
    const billzifyLink = `https://live.billzify.com/bookbe/SC1NYWxheQ/?checkin=${checkin}&checkout=${checkout}&noOfGuests=${guests}`;
    window.location.href = billzifyLink;
  }
  
  window.handleBooking = handleBooking;
  
  setupReveal();
</script>
</body>
</html>
